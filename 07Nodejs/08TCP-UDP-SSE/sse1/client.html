<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <h1>Hora actualizada del servidor:</h1>
        <div id="time"></div>

        <script>
            const eventSource = new EventSource("http://localhost:3000/datos");

            eventSource.onmessage = (event) => {
                document.getElementById("time").textContent = event.data;
            };

            eventSource.onerror = (event) => {
                console.error("Error de SSE: ", event);
                eventSource.close();
            };
        </script>
    </body>
</html>
