<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <h1>Cotizacion de la empresa en bolsa:</h1>
        <h3>Ultima actualizacion: <span id="time">Cargando...</span></h3>
        <b>
            <h3>Cotizacion: <span id="coti">Cargando...</span></h3>
        </b>

        <script>
            const eventSource = new EventSource("http://localhost:3000/events");

            eventSource.onmessage = (event) => {
                console.log(event.data);

                const datos = event.data.split(";");

                document.getElementById("coti").textContent = datos[0];
                document.getElementById("time").textContent =
                    datos[1] + " " + datos[2];
            };

            eventSource.onerror = (event) => {
                console.error("Error de SSE: ", event);
                eventSource.close();
            };
        </script>
    </body>
</html>
